<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nike</title>
    <link rel="stylesheet" href="./styles/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700@display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Header -->
    <header id="header">
      <nav class="header-nav container">
        <img src="./assets/icons/nike-logo.svg" alt="Nike Logo" />
        <ul class="header-nav__items">
          <li class="header-nav__item">
            <a href="#" class="header-nav__link">Sneakers</a>
          </li>
          <li class="header-nav__item">
            <a href="#" class="header-nav__link">Gumshoes</a>
          </li>
          <li class="header-nav__item">
            <a href="#" class="header-nav__link">T-shirts</a>
          </li>
          <li class="header-nav__item">
            <a href="#" class="header-nav__link">Shorts</a>
          </li>
          <li class="header-nav__item">
            <a href="#" class="header-nav__link">Jeans</a>
          </li>
          <li class="header-nav__item">
            <a href="#" class="header-nav__link">Sweaters</a>
          </li>
          <li class="header-nav__item">
            <a href="#" class="header-nav__link">Sweatshirts</a>
          </li>
        </ul>
      </nav>
    </header>
    <!-- /Header -->

    <main class="container">
      <!-- Banner -->
      <section id="banner">
        <h1 class="banner-paragraph">NIKE</h1>
        <p class="banner-text">
          Cool sneakers from <span class="banner-text-bold">NIKE</span> for you
        </p>
      </section>
      <!-- /Banner -->
    </main>
  </body>
</html>
